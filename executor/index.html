<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>WillExecutor</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-950 text-white min-h-screen p-6"><div class="max-w-2xl mx-auto">
<h1 class="text-2xl font-bold mb-6">📜 WillExecutor</h1>
<div class="bg-gray-900 rounded-xl p-6 mb-4 border border-gray-800 space-y-3">
<h2 class="text-teal-400 font-semibold">Create Will</h2>
<textarea placeholder="Conditions in plain language..." rows="3" class="w-full bg-gray-950 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-600 outline-none resize-none"></textarea>
<input placeholder="Beneficiary address" class="w-full bg-gray-950 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-600 outline-none">
<input placeholder="Check URL (fetched to verify conditions)" class="w-full bg-gray-950 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-600 outline-none">
<button class="w-full bg-teal-600 hover:bg-teal-700 rounded-lg py-3 font-bold">Create Will</button>
</div>
<div class="bg-gray-900 rounded-xl p-6 border border-gray-800 space-y-3">
<h2 class="text-orange-400 font-semibold">Check Conditions</h2>
<input placeholder="Will key" class="w-full bg-gray-950 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-600 outline-none">
<button class="w-full bg-orange-600 hover:bg-orange-700 rounded-lg py-3 font-bold">⏰ Check Now</button>
</div>
</div></body></html>
